# LightProxy Configuration
# =========================
# This file controls HTTP and SOCKS5 proxy settings.
# Each service can be enabled/disabled independently with its own port.

# --- HTTP Proxy ---
http.enabled=true
http.port=8080

# --- SOCKS5 Proxy ---
socks5.enabled=true
socks5.port=1080

# --- SOCKS4 Proxy ---
socks4.enabled=false
socks4.port=1081

# --- General ---
# Worker thread pool max size (0 = unlimited)
thread.pool.max=0
# Socket read timeout in milliseconds (0 = infinite)
socket.timeout=30000
# Connection timeout to target server in milliseconds
connect.timeout=10000
